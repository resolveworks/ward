---
# install.yml - Install or reconcile the Ward systemd-nspawn machine.
#
# Idempotent and safe to re-run: it creates the machine when absent and
# reconciles the declared definitions (ward.nspawn, resources.conf,
# packages.txt, hostname/locale/timezone, and the agent account) when present.
# It does NOT start the machine, does NOT add a reinstall path, and does NOT
# uninstall (see uninstall.yml for the destructive lifecycle).
#
# Run from the repository root with privilege escalation:
#   ansible-playbook install.yml [-K]
#
# NOTE: package reconciliation chroots into the machine root, which must not be
# running at apply time (a running container owns its live pacman database and
# API mounts). Stop Ward before reconciling packages:
#   systemctl stop systemd-nspawn@ward.service

- name: Install and reconcile the Ward nspawn machine
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  vars:
    # Deliberate values, kept consistent with ward.nspawn, resources.conf and
    # the documented first-boot settings. Treat as canonical.
    ward_root: /var/lib/machines/ward
    ward_hostname: ward
    ward_locale: en_US.UTF-8
    ward_timezone: Europe/Amsterdam
    ward_agent_name: agent
    # UID 1000 is also the GID of the agent's user-private primary group.
    ward_agent_uid: 1000

    # Host packages needed to build and manage the machine. These are never
    # removed by uninstall.
    host_packages:
      - arch-install-scripts
      - systemd

    # Container packages come from packages.txt: one explicit Arch package per
    # line. Blank lines and comments are ignored.
    packages_file: "{{ playbook_dir }}/packages.txt"
    ward_packages: >-
      {{
        lookup('file', packages_file).splitlines()
        | map('trim')
        | reject('match', '^(#|$)')
        | list
      }}

  tasks:
    # ansible.builtin.package would proxy to community.general.pacman (a
    # third-party collection, intentionally not used here) and needs gathered
    # facts to auto-detect the manager. Running pacman directly with --needed
    # is the clean built-in path under gather_facts: false.
    - name: Ensure host build and runtime dependencies are installed
      ansible.builtin.command:
        argv: "{{ ['pacman', '-S', '--needed', '--noconfirm'] + host_packages }}"
      register: host_packages_result
      changed_when: "'there is nothing to do' not in (host_packages_result.stdout | lower)"

    - name: Ensure machine root directory exists
      ansible.builtin.file:
        path: "{{ ward_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # Guarded so it runs only against a root that has not yet been bootstrapped;
    # pacstrap is not itself idempotent.
    - name: Bootstrap Arch root with declared packages
      ansible.builtin.command:
        argv: "{{ ['pacstrap', '-K', ward_root] + ward_packages }}"
        creates: "{{ ward_root }}/var/lib/pacman/local"

    # Reconcile container packages against packages.txt. pacstrap only runs on
    # first bootstrap, so packages added to packages.txt later would otherwise
    # never reach an existing machine. --needed makes this PRESENCE-ONLY: it
    # installs any missing declared package and never removes anything (neither
    # undeclared nor manually installed packages). Requires the machine to be
    # stopped; see the header note.
    - name: Ensure all declared packages are present in the machine
      ansible.builtin.command:
        argv: "{{ ['arch-chroot', ward_root, 'pacman', '--noconfirm', '--needed', '--noprogressbar', '-S'] + ward_packages }}"
      register: ward_packages_result
      changed_when: "'there is nothing to do' not in (ward_packages_result.stdout | lower)"

    # The three first-boot settings are converged directly on the files that
    # systemd-firstboot(1) controls (/etc/hostname, /etc/locale.conf and the
    # /etc/localtime zoneinfo symlink). Unlike systemd-firstboot, which only
    # writes absent files (it needs --force to repair drift), these idempotent
    # modules also correct drift on every apply. They operate on the filesystem
    # directly, just like systemd-firstboot does for an offline image.
    - name: Converge hostname
      ansible.builtin.copy:
        dest: "{{ ward_root }}/etc/hostname"
        content: "{{ ward_hostname }}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Converge system locale
      ansible.builtin.copy:
        dest: "{{ ward_root }}/etc/locale.conf"
        content: "LANG={{ ward_locale }}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Converge timezone
      ansible.builtin.file:
        src: "/usr/share/zoneinfo/{{ ward_timezone }}"
        dest: "{{ ward_root }}/etc/localtime"
        state: link
        # force lets the link converge whether dest is absent, a divergent
        # symlink, or a copied file; it is a no-op when already correct.
        force: true
        owner: root
        group: root

    # Snapshot the agent's passwd/group entries once, after bootstrap, so the
    # create-vs-reconcile decisions use consistent state. Reading these
    # well-defined colon-delimited files via lookup avoids fragile shell
    # parsing and there is no built-in module that targets an alternate root.
    - name: Read current agent account state from the machine root
      ansible.builtin.set_fact:
        ward_agent_passwd_entry: >-
          {{
            (lookup('file', ward_root ~ '/etc/passwd').splitlines()
              | select('match', ward_agent_name ~ ':')
              | list) | first | default('')
          }}
        ward_agent_group_entry: >-
          {{
            (lookup('file', ward_root ~ '/etc/group').splitlines()
              | select('match', ward_agent_name ~ ':')
              | list) | first | default('')
          }}

    - name: Ensure the agent private primary group exists
      ansible.builtin.command:
        argv:
          - groupadd
          - "--root={{ ward_root }}"
          - "--gid={{ ward_agent_uid }}"
          - "{{ ward_agent_name }}"
      when: ward_agent_group_entry | length == 0
      changed_when: true

    # groupmod fails clearly if GID 1000 is already held by another group
    # instead of silently corrupting group ownership.
    - name: Reconcile the agent group GID
      ansible.builtin.command:
        argv:
          - groupmod
          - "--root={{ ward_root }}"
          - "--gid={{ ward_agent_uid }}"
          - "{{ ward_agent_name }}"
      when:
        - ward_agent_group_entry | length > 0
        - (ward_agent_group_entry.split(':')[2] | default('') | int) != (ward_agent_uid | int)
      changed_when: true

    - name: Ensure the unprivileged agent user exists
      ansible.builtin.command:
        argv:
          - useradd
          - "--root={{ ward_root }}"
          - "--uid={{ ward_agent_uid }}"
          - "--gid={{ ward_agent_uid }}"
          - "--home-dir=/home/{{ ward_agent_name }}"
          - --create-home
          - "--shell=/bin/bash"
          - "{{ ward_agent_name }}"
      when: ward_agent_passwd_entry | length == 0
      changed_when: true

    # Repair drift in uid/gid/home/shell in one pass. usermod leaves any field
    # already at its declared value untouched, and fails clearly on genuine
    # conflicts (e.g. UID 1000 already used by a different user, or a missing
    # target group). --home without --move-home only updates the passwd entry,
    # never relocating the bind-mounted .pi directory.
    - name: Reconcile the agent account attributes
      ansible.builtin.command:
        argv:
          - usermod
          - "--root={{ ward_root }}"
          - "--uid={{ ward_agent_uid }}"
          - "--gid={{ ward_agent_uid }}"
          - "--home=/home/{{ ward_agent_name }}"
          - "--shell=/bin/bash"
          - "{{ ward_agent_name }}"
      when:
        - ward_agent_passwd_entry | length > 0
        - >-
          (ward_agent_passwd_entry.split(':')[2] | default('') | int) != (ward_agent_uid | int)
          or (ward_agent_passwd_entry.split(':')[3] | default('') | int) != (ward_agent_uid | int)
          or (ward_agent_passwd_entry.split(':')[5] | default('')) != ('/home/' ~ ward_agent_name)
          or (ward_agent_passwd_entry.split(':')[6] | default('')) != '/bin/bash'
      changed_when: true

    - name: Ensure workspace mount point is owned by the agent
      ansible.builtin.file:
        path: "{{ ward_root }}/workspace"
        state: directory
        owner: "{{ ward_agent_uid }}"
        group: "{{ ward_agent_uid }}"
        mode: "0755"

    - name: Ensure agent .pi mount point is owned by the agent
      ansible.builtin.file:
        path: "{{ ward_root }}/home/{{ ward_agent_name }}/.pi"
        state: directory
        owner: "{{ ward_agent_uid }}"
        group: "{{ ward_agent_uid }}"
        mode: "0755"

    - name: Ensure systemd-nspawn config directory exists
      ansible.builtin.file:
        path: /etc/systemd/nspawn
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure systemd-nspawn service drop-in directory exists
      ansible.builtin.file:
        path: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install the nspawn definition
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/ward.nspawn"
        dest: "/etc/systemd/nspawn/{{ ward_hostname }}.nspawn"
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd manager

    - name: Install the resource limits drop-in
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/resources.conf"
        dest: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d/resources.conf"
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd manager

  handlers:
    - name: Reload systemd manager
      ansible.builtin.systemd_service:
        daemon_reload: true
