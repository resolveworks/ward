---
# Install or reconcile Ward. Host tasks bootstrap the machine and its SSH
# access. Once bootstrapped, Ward is managed over SSH while it remains running.
#
# Run: ansible-playbook install.yml [-K]

- name: Install and start the Ward nspawn machine
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  vars:
    # Keep these values consistent with ward.nspawn and resources.conf.
    ward_root: /var/lib/machines/ward
    ward_hostname: ward
    ward_agent_name: agent
    ward_agent_uid: 1000
    ward_ssh_public_key_file: /home/johan/.ssh/id_ed25519.pub

    # Uninstall does not remove host dependencies.
    host_packages:
      - arch-install-scripts
      - systemd

    # Blank lines and comments in packages.txt are ignored.
    packages_file: "{{ playbook_dir }}/packages.txt"
    ward_packages: >-
      {{
        lookup('file', packages_file).splitlines()
        | map('trim')
        | reject('match', '^(#|$)')
        | list
      }}

  tasks:
    # The package module needs community.general.pacman and gathered facts.
    - name: Ensure host build and runtime dependencies are installed
      ansible.builtin.command:
        argv: "{{ ['pacman', '-S', '--needed', '--noconfirm'] + host_packages }}"
      register: host_packages_result
      changed_when: "'there is nothing to do' not in (host_packages_result.stdout | lower)"

    - name: Ensure machine root directory exists
      ansible.builtin.file:
        path: "{{ ward_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # pacstrap is not idempotent, so run it only for an unbootstrapped root.
    - name: Bootstrap Arch root with declared packages
      ansible.builtin.command:
        argv: "{{ ['pacstrap', '-K', ward_root] + ward_packages }}"
        creates: "{{ ward_root }}/var/lib/pacman/local"

    # owneridmap derives its mapping from each target owner before mounting.
    - name: Ensure agent-owned bind mount points exist in the machine root
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ward_agent_uid }}"
        group: "{{ ward_agent_uid }}"
        mode: "0755"
      loop:
        - "{{ ward_root }}/workspace"
        - "{{ ward_root }}/home/{{ ward_agent_name }}/.pi"
      register: ward_bind_mount_points

    - name: Inspect Ward SSH bootstrap files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ ward_root }}/usr/bin/python"
        - "{{ ward_root }}/usr/bin/sshd"
        - "{{ ward_root }}/root/.ssh/authorized_keys"
        - "{{ ward_root }}/etc/systemd/system/multi-user.target.wants/sshd.service"
        - "{{ ward_root }}/etc/systemd/system/multi-user.target.wants/systemd-networkd.service"
      register: ward_ssh_bootstrap_files

    - name: Decide whether Ward needs offline SSH bootstrap
      ansible.builtin.set_fact:
        ward_needs_ssh_bootstrap: >-
          {{
            ward_ssh_bootstrap_files.results
            | map(attribute='stat.exists')
            | reject('equalto', true)
            | list
            | length > 0
          }}

    # Required bootstrap files can only be repaired while Ward is stopped.
    - name: Stop Ward for SSH bootstrap
      ansible.builtin.systemd_service:
        name: "systemd-nspawn@{{ ward_hostname }}.service"
        state: stopped
      when: ward_needs_ssh_bootstrap

    - name: Ensure SSH bootstrap packages are installed
      ansible.builtin.command:
        argv:
          - arch-chroot
          - "{{ ward_root }}"
          - pacman
          - --noconfirm
          - --needed
          - --noprogressbar
          - -S
          - openssh
          - python
      register: ward_bootstrap_packages_result
      changed_when: >-
        'there is nothing to do' not in
        (ward_bootstrap_packages_result.stdout | lower)
      when: ward_needs_ssh_bootstrap

    - name: Ensure root SSH directory exists for bootstrap
      ansible.builtin.file:
        path: "{{ ward_root }}/root/.ssh"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: ward_needs_ssh_bootstrap

    - name: Authorize the controller SSH key for bootstrap
      ansible.builtin.copy:
        dest: "{{ ward_root }}/root/.ssh/authorized_keys"
        content: "{{ lookup('file', ward_ssh_public_key_file) }}\n"
        owner: root
        group: root
        mode: "0600"
      when: ward_needs_ssh_bootstrap

    - name: Ensure sshd system service directory exists for bootstrap
      ansible.builtin.file:
        path: "{{ ward_root }}/etc/systemd/system/multi-user.target.wants"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: ward_needs_ssh_bootstrap

    - name: Enable sshd for bootstrap
      ansible.builtin.file:
        src: /usr/lib/systemd/system/sshd.service
        dest: "{{ ward_root }}/etc/systemd/system/multi-user.target.wants/sshd.service"
        state: link
        owner: root
        group: root
      when: ward_needs_ssh_bootstrap

    - name: Enable systemd-networkd for bootstrap
      ansible.builtin.file:
        src: /usr/lib/systemd/system/systemd-networkd.service
        dest: "{{ ward_root }}/etc/systemd/system/multi-user.target.wants/systemd-networkd.service"
        state: link
        owner: root
        group: root
      when: ward_needs_ssh_bootstrap

    - name: Ensure systemd-nspawn config directory exists
      ansible.builtin.file:
        path: /etc/systemd/nspawn
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure systemd-nspawn service drop-in directory exists
      ansible.builtin.file:
        path: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install the nspawn definition
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/ward.nspawn"
        dest: "/etc/systemd/nspawn/{{ ward_hostname }}.nspawn"
        owner: root
        group: root
        mode: "0644"
      register: ward_nspawn_definition
      notify: Reload systemd manager

    - name: Install the resource limits drop-in
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/resources.conf"
        dest: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d/resources.conf"
        owner: root
        group: root
        mode: "0644"
      register: ward_resource_limits
      notify: Reload systemd manager

    - name: Flush handlers before starting or restarting Ward
      ansible.builtin.meta: flush_handlers

    - name: Stop Ward after host-side configuration changes
      ansible.builtin.systemd_service:
        name: "systemd-nspawn@{{ ward_hostname }}.service"
        state: stopped
      when: >-
        ward_nspawn_definition.changed
        or ward_resource_limits.changed
        or ward_bind_mount_points.changed

    - name: Enable Ward at boot and ensure it is running
      ansible.builtin.systemd_service:
        name: "systemd-nspawn@{{ ward_hostname }}.service"
        enabled: true
        state: started

    - name: Wait for Ward SSH access
      ansible.builtin.wait_for:
        host: "{{ ward_hostname }}"
        port: 22
        connect_timeout: 5
        timeout: 60

  handlers:
    - name: Reload systemd manager
      ansible.builtin.systemd_service:
        daemon_reload: true

- name: Reconcile the running Ward machine over SSH
  hosts: ward_machines
  gather_facts: false

  vars:
    ward_hostname: ward
    ward_locale: en_US.UTF-8
    ward_timezone: Europe/Amsterdam
    ward_agent_name: agent
    ward_agent_uid: 1000
    ward_ssh_public_key_file: /home/johan/.ssh/id_ed25519.pub
    packages_file: "{{ playbook_dir }}/packages.txt"
    ward_packages: >-
      {{
        lookup('file', packages_file).splitlines()
        | map('trim')
        | reject('match', '^(#|$)')
        | list
      }}

  tasks:
    # Presence-only: install missing declarations without removing packages.
    - name: Ensure all declared packages are present in Ward
      ansible.builtin.command:
        argv: "{{ ['pacman', '--noconfirm', '--needed', '--noprogressbar', '-S'] + ward_packages }}"
      register: ward_packages_result
      changed_when: "'there is nothing to do' not in (ward_packages_result.stdout | lower)"

    - name: Converge hostname file
      ansible.builtin.copy:
        dest: /etc/hostname
        content: "{{ ward_hostname }}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Converge system locale
      ansible.builtin.copy:
        dest: /etc/locale.conf
        content: "LANG={{ ward_locale }}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Converge timezone
      ansible.builtin.file:
        src: "/usr/share/zoneinfo/{{ ward_timezone }}"
        dest: /etc/localtime
        state: link
        force: true
        owner: root
        group: root

    - name: Ensure the agent private primary group exists
      ansible.builtin.group:
        name: "{{ ward_agent_name }}"
        gid: "{{ ward_agent_uid }}"
        state: present

    - name: Ensure the unprivileged agent user exists
      ansible.builtin.user:
        name: "{{ ward_agent_name }}"
        uid: "{{ ward_agent_uid }}"
        group: "{{ ward_agent_name }}"
        home: "/home/{{ ward_agent_name }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Ensure agent home is owned by the agent
      ansible.builtin.file:
        path: "/home/{{ ward_agent_name }}"
        state: directory
        owner: "{{ ward_agent_name }}"
        group: "{{ ward_agent_name }}"
        mode: "0755"

    - name: Ensure root SSH directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Authorize the controller SSH key
      ansible.builtin.copy:
        dest: /root/.ssh/authorized_keys
        content: "{{ lookup('file', ward_ssh_public_key_file) }}\n"
        owner: root
        group: root
        mode: "0600"

    - name: Ensure systemd-networkd is enabled and running
      ansible.builtin.systemd_service:
        name: systemd-networkd.service
        enabled: true
        state: started

    - name: Ensure sshd is enabled and running
      ansible.builtin.systemd_service:
        name: sshd.service
        enabled: true
        state: started
