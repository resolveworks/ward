---
# Destructively remove Ward without confirmation. Host dependencies and bind
# mount sources are preserved. Safe to re-run when Ward is absent.
#
# Run: ansible-playbook uninstall.yml [-K]

- name: Uninstall the Ward nspawn machine
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  vars:
    ward_root: /var/lib/machines/ward
    ward_hostname: ward

  tasks:
    # Detach bind mounts before deleting the root.
    - name: Stop the Ward machine if it is running
      ansible.builtin.systemd_service:
        name: "systemd-nspawn@{{ ward_hostname }}.service"
        state: stopped

    - name: Remove the machine root
      ansible.builtin.file:
        path: "{{ ward_root }}"
        state: absent

    - name: Remove the nspawn definition
      ansible.builtin.file:
        path: "/etc/systemd/nspawn/{{ ward_hostname }}.nspawn"
        state: absent
      notify: Reload systemd manager

    - name: Remove the Ward service drop-in directory
      ansible.builtin.file:
        path: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d"
        state: absent
      notify: Reload systemd manager

  handlers:
    - name: Reload systemd manager
      ansible.builtin.systemd_service:
        daemon_reload: true
