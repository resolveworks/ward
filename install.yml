---
# Install or reconcile Ward. A running machine is stopped for offline
# changes and restored only after a successful apply. An initially stopped
# machine remains stopped.
#
# Run: ansible-playbook install.yml [-K]

- name: Install and reconcile the Ward nspawn machine
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  vars:
    # Keep these values consistent with ward.nspawn and resources.conf.
    ward_root: /var/lib/machines/ward
    ward_hostname: ward
    ward_locale: en_US.UTF-8
    ward_timezone: Europe/Amsterdam
    ward_agent_name: agent
    # Also used for the agent's private primary group.
    ward_agent_uid: 1000

    # Uninstall does not remove host dependencies.
    host_packages:
      - arch-install-scripts
      - systemd

    # Blank lines and comments in packages.txt are ignored.
    packages_file: "{{ playbook_dir }}/packages.txt"
    ward_packages: >-
      {{
        lookup('file', packages_file).splitlines()
        | map('trim')
        | reject('match', '^(#|$)')
        | list
      }}

  tasks:
    # An instance may be absent from service facts until first activation.
    - name: Detect whether the Ward machine is currently running
      ansible.builtin.service_facts:

    - name: Remember whether Ward was running before this apply
      ansible.builtin.set_fact:
        ward_was_running: >-
          {{
            (ansible_facts.services['systemd-nspawn@' ~ ward_hostname ~ '.service']
              | default({})).state | default('') == 'running'
          }}

    # The package module needs community.general.pacman and gathered facts.
    # Run this host-only step before stopping Ward to minimize downtime.
    - name: Ensure host build and runtime dependencies are installed
      ansible.builtin.command:
        argv: "{{ ['pacman', '-S', '--needed', '--noconfirm'] + host_packages }}"
      register: host_packages_result
      changed_when: "'there is nothing to do' not in (host_packages_result.stdout | lower)"

    # Offline reconciliation requires the container's package database and
    # API mounts to be inactive.
    - name: Stop the running Ward machine so its offline root can be reconciled
      ansible.builtin.systemd_service:
        name: "systemd-nspawn@{{ ward_hostname }}.service"
        state: stopped
      when: ward_was_running

    - name: Ensure machine root directory exists
      ansible.builtin.file:
        path: "{{ ward_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # pacstrap is not idempotent, so run it only for an unbootstrapped root.
    - name: Bootstrap Arch root with declared packages
      ansible.builtin.command:
        argv: "{{ ['pacstrap', '-K', ward_root] + ward_packages }}"
        creates: "{{ ward_root }}/var/lib/pacman/local"

    # Presence-only: install missing declarations without removing packages.
    - name: Ensure all declared packages are present in the machine
      ansible.builtin.command:
        argv: "{{ ['arch-chroot', ward_root, 'pacman', '--noconfirm', '--needed', '--noprogressbar', '-S'] + ward_packages }}"
      register: ward_packages_result
      changed_when: "'there is nothing to do' not in (ward_packages_result.stdout | lower)"

    # Manage first-boot files directly so later applies also correct drift.
    - name: Converge hostname
      ansible.builtin.copy:
        dest: "{{ ward_root }}/etc/hostname"
        content: "{{ ward_hostname }}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Converge system locale
      ansible.builtin.copy:
        dest: "{{ ward_root }}/etc/locale.conf"
        content: "LANG={{ ward_locale }}\n"
        owner: root
        group: root
        mode: "0644"

    - name: Converge timezone
      ansible.builtin.file:
        src: "/usr/share/zoneinfo/{{ ward_timezone }}"
        dest: "{{ ward_root }}/etc/localtime"
        state: link
        # Replace either a divergent symlink or a copied file.
        force: true
        owner: root
        group: root

    # Snapshot both entries because the user module cannot target another root.
    - name: Read current agent account state from the machine root
      ansible.builtin.set_fact:
        ward_agent_passwd_entry: >-
          {{
            (lookup('file', ward_root ~ '/etc/passwd').splitlines()
              | select('match', ward_agent_name ~ ':')
              | list) | first | default('')
          }}
        ward_agent_group_entry: >-
          {{
            (lookup('file', ward_root ~ '/etc/group').splitlines()
              | select('match', ward_agent_name ~ ':')
              | list) | first | default('')
          }}

    - name: Ensure the agent private primary group exists
      ansible.builtin.command:
        argv:
          - groupadd
          - "--root={{ ward_root }}"
          - "--gid={{ ward_agent_uid }}"
          - "{{ ward_agent_name }}"
      when: ward_agent_group_entry | length == 0
      changed_when: true

    # groupmod reports a conflict if the requested GID is already in use.
    - name: Reconcile the agent group GID
      ansible.builtin.command:
        argv:
          - groupmod
          - "--root={{ ward_root }}"
          - "--gid={{ ward_agent_uid }}"
          - "{{ ward_agent_name }}"
      when:
        - ward_agent_group_entry | length > 0
        - (ward_agent_group_entry.split(':')[2] | default('') | int) != (ward_agent_uid | int)
      changed_when: true

    - name: Ensure the unprivileged agent user exists
      ansible.builtin.command:
        argv:
          - useradd
          - "--root={{ ward_root }}"
          - "--uid={{ ward_agent_uid }}"
          - "--gid={{ ward_agent_uid }}"
          - "--home-dir=/home/{{ ward_agent_name }}"
          - --create-home
          - "--shell=/bin/bash"
          - "{{ ward_agent_name }}"
      when: ward_agent_passwd_entry | length == 0
      changed_when: true

    # Without --move-home, --home updates passwd without moving mounted data.
    - name: Reconcile the agent account attributes
      ansible.builtin.command:
        argv:
          - usermod
          - "--root={{ ward_root }}"
          - "--uid={{ ward_agent_uid }}"
          - "--gid={{ ward_agent_uid }}"
          - "--home=/home/{{ ward_agent_name }}"
          - "--shell=/bin/bash"
          - "{{ ward_agent_name }}"
      when:
        - ward_agent_passwd_entry | length > 0
        - >-
          (ward_agent_passwd_entry.split(':')[2] | default('') | int) != (ward_agent_uid | int)
          or (ward_agent_passwd_entry.split(':')[3] | default('') | int) != (ward_agent_uid | int)
          or (ward_agent_passwd_entry.split(':')[5] | default('')) != ('/home/' ~ ward_agent_name)
          or (ward_agent_passwd_entry.split(':')[6] | default('')) != '/bin/bash'
      changed_when: true

    - name: Ensure workspace mount point is owned by the agent
      ansible.builtin.file:
        path: "{{ ward_root }}/workspace"
        state: directory
        owner: "{{ ward_agent_uid }}"
        group: "{{ ward_agent_uid }}"
        mode: "0755"

    - name: Ensure agent .pi mount point is owned by the agent
      ansible.builtin.file:
        path: "{{ ward_root }}/home/{{ ward_agent_name }}/.pi"
        state: directory
        owner: "{{ ward_agent_uid }}"
        group: "{{ ward_agent_uid }}"
        mode: "0755"

    - name: Ensure systemd-nspawn config directory exists
      ansible.builtin.file:
        path: /etc/systemd/nspawn
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure systemd-nspawn service drop-in directory exists
      ansible.builtin.file:
        path: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install the nspawn definition
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/ward.nspawn"
        dest: "/etc/systemd/nspawn/{{ ward_hostname }}.nspawn"
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd manager

    - name: Install the resource limits drop-in
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/resources.conf"
        dest: "/etc/systemd/system/systemd-nspawn@{{ ward_hostname }}.service.d/resources.conf"
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd manager

    # Reload changed definitions before restoring a previously running Ward.
    # A failure above skips both this flush and the restore.
    - name: Flush handlers so changed unit/drop-in definitions are reloaded
      ansible.builtin.meta: flush_handlers

    # Never start a machine that was stopped when the apply began.
    - name: Restart the Ward machine if it was running before this apply
      ansible.builtin.systemd_service:
        name: "systemd-nspawn@{{ ward_hostname }}.service"
        state: started
      when: ward_was_running

  handlers:
    - name: Reload systemd manager
      ansible.builtin.systemd_service:
        daemon_reload: true
